<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Surfaces & Text</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-surface); }
  .chip { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--color-border); flex-shrink: 0; }
  .name { font-size: 13px; font-weight: 600; color: var(--color-text-primary); line-height: 1.3; }
  .hex { font-size: 11px; color: var(--color-text-muted); font-variant-numeric: tabular-nums; margin-top: 2px; }
  h4 { margin: 0 0 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); }
  .section + .section { margin-top: 18px; }
</style>
</head>
<body>
  <div class="section">
    <h4>Surfaces</h4>
    <div class="grid">
      <div class="row"><div class="chip" style="background:#F8FAFC"></div><div><div class="name">Canvas</div><div class="hex">#F8FAFC</div></div></div>
      <div class="row"><div class="chip" style="background:#FFFFFF"></div><div><div class="name">Surface</div><div class="hex">#FFFFFF</div></div></div>
      <div class="row"><div class="chip" style="background:#F3F4F6"></div><div><div class="name">Muted</div><div class="hex">#F3F4F6</div></div></div>
    </div>
  </div>
  <div class="section">
    <h4>Text</h4>
    <div class="grid">
      <div class="row"><div class="chip" style="background:#111827"></div><div><div class="name">Primary</div><div class="hex">#111827</div></div></div>
      <div class="row"><div class="chip" style="background:#4B5563"></div><div><div class="name">Secondary</div><div class="hex">#4B5563</div></div></div>
      <div class="row"><div class="chip" style="background:#9CA3AF"></div><div><div class="name">Muted</div><div class="hex">#9CA3AF</div></div></div>
    </div>
  </div>
  <div class="section">
    <h4>Borders</h4>
    <div class="grid">
      <div class="row"><div class="chip" style="background:#E5E7EB"></div><div><div class="name">Default</div><div class="hex">#E5E7EB</div></div></div>
      <div class="row"><div class="chip" style="background:#D1D5DB"></div><div><div class="name">Strong</div><div class="hex">#D1D5DB</div></div></div>
      <div class="row"><div class="chip" style="background:#1E2A44"></div><div><div class="name">Focus</div><div class="hex">#1E2A44</div></div></div>
    </div>
  </div>
</body>
</html>
