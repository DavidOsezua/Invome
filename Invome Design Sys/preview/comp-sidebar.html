<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Sidebar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 20px; font-family: var(--font-sans); background: #F8FAFC; }
  .wrap { display: flex; gap: 16px; }
  .side {
    width: 232px; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px;
    padding: 16px 12px; box-shadow: 0 1px 2px rgba(17,24,39,0.04);
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 14px; border-bottom: 1px solid #F3F4F6; margin-bottom: 12px; }
  .mark { width: 26px; height: 26px; border-radius: 6px; background: #1E2A44; display: grid; place-items: center; }
  .brand b { font-size: 15px; font-weight: 600; color: #111827; letter-spacing: -0.01em; }
  .newinv {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 36px; background: #1E2A44; color: #fff; border: 0; border-radius: 6px;
    font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 14px;
  }
  .nav a {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    font-size: 13px; font-weight: 500; color: #4B5563; text-decoration: none;
    border-radius: 6px; margin-bottom: 2px;
    transition: background 160ms, color 160ms;
  }
  .nav a:hover { background: #F3F4F6; color: #111827; }
  .nav a.active { background: #F3F4F6; color: #111827; }
  .nav a.active i { color: #1E2A44; }
  .nav i { color: #9CA3AF; }
  .note { flex:1; font-size: 12px; color: #4B5563; line-height: 1.55; padding: 10px; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; align-self: flex-start; }
  .note b { color: #111827; }
</style>
</head>
<body>
  <div class="wrap">
    <aside class="side">
      <div class="brand">
        <div class="mark"><svg width="16" height="16" viewBox="0 0 32 32" fill="none"><path d="M10 9.5v13M22 9.5v13M10 9.5l12 13" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <b>Invome</b>
      </div>
      <button class="newinv"><i data-lucide="plus" style="width:16px;height:16px;stroke-width:1.5"></i>New invoice</button>
      <nav class="nav">
        <a href="#"><i data-lucide="layout-dashboard" style="width:16px;height:16px;stroke-width:1.5"></i>Dashboard</a>
        <a href="#" class="active"><i data-lucide="file-text" style="width:16px;height:16px;stroke-width:1.5"></i>Invoices</a>
        <a href="#"><i data-lucide="users" style="width:16px;height:16px;stroke-width:1.5"></i>Clients</a>
        <a href="#"><i data-lucide="bar-chart-2" style="width:16px;height:16px;stroke-width:1.5"></i>Reports</a>
        <a href="#"><i data-lucide="settings" style="width:16px;height:16px;stroke-width:1.5"></i>Settings</a>
      </nav>
    </aside>
    <div class="note">
      <b>Sidebar · 232px fixed.</b><br>
      Persistent across all screens. Primary CTA sits above nav. Active row uses <code style="font-family:ui-monospace,monospace">#F3F4F6</code> fill — no left-border accent, no colored pill. Icons: Lucide, 1.5 stroke, 16px here / 20px at larger scales.
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
