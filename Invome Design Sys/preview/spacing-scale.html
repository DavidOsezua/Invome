<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 60px 80px 1fr; gap: 14px; align-items: center; padding: 7px 0; }
  .token { font-size: 12px; font-weight: 600; color: var(--color-text-primary); font-variant-numeric: tabular-nums; }
  .px { font-size: 11px; color: var(--color-text-muted); font-variant-numeric: tabular-nums; }
  .bar { height: 14px; background: var(--color-ink-blue); border-radius: 3px; }
  .note { margin-top: 12px; font-size: 11px; color: var(--color-text-secondary); padding: 8px 10px; background: #F8FAFC; border: 1px solid var(--color-border); border-radius: 6px; }
  .note b { color: var(--color-text-primary); }
</style>
</head>
<body>
  <div class="row"><span class="token">space-1</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="token">space-2</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="token">space-3</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="token">space-4</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="token">space-5</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="token">space-6</span><span class="px">40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="token">space-7</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="token">space-8</span><span class="px">64px</span><span class="bar" style="width:64px"></span></div>
  <div class="note"><b>8px grid.</b> Everything snaps to a multiple of 8. Financial data gets extra breathing room — prefer space-4/space-5 between blocks, space-3 within.</div>
</body>
</html>
