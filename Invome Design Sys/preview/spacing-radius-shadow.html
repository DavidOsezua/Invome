<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Radius & Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .section + .section { margin-top: 20px; }
  h4 { margin: 0 0 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); }
  .row { display: flex; gap: 16px; }
  .tile {
    flex: 1; background: var(--color-surface); border: 1px solid var(--color-border);
    height: 72px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--color-text-secondary); font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .shade {
    flex: 1; background: #fff; height: 72px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--color-text-secondary); font-weight: 500; font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <div class="section">
    <h4>Radius</h4>
    <div class="row">
      <div class="tile" style="border-radius:4px">xs · 4px</div>
      <div class="tile" style="border-radius:6px">sm · 6px · inputs</div>
      <div class="tile" style="border-radius:8px">md · 8px · cards</div>
      <div class="tile" style="border-radius:12px">lg · 12px · modals</div>
      <div class="tile" style="border-radius:9999px">pill · 9999px</div>
    </div>
  </div>
  <div class="section" style="background:#F8FAFC;padding:16px;border-radius:8px">
    <h4>Shadow — restrained</h4>
    <div class="row">
      <div class="shade" style="box-shadow:0 1px 2px rgba(17,24,39,0.04)">xs · borders only</div>
      <div class="shade" style="box-shadow:0 1px 2px rgba(17,24,39,0.04),0 1px 3px rgba(17,24,39,0.06)">sm · cards</div>
      <div class="shade" style="box-shadow:0 4px 8px -2px rgba(17,24,39,0.06),0 2px 4px -2px rgba(17,24,39,0.04)">md · dropdowns</div>
      <div class="shade" style="box-shadow:0 12px 24px -6px rgba(17,24,39,0.10),0 4px 8px -4px rgba(17,24,39,0.06)">lg · modals, drawers</div>
    </div>
  </div>
</body>
</html>
